<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — NovaShop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="navbar-mount"></div>

  <main class="section">
    <div class="container">
      <div class="section-head"><h2>Admin Dashboard</h2></div>

      <div id="adminRoot">
        <div class="admin-layout">
          <aside class="admin-sidebar">
            <button class="admin-nav-btn active" data-tab="products">Products</button>
            <button class="admin-nav-btn" data-tab="orders">Orders</button>
            <button class="admin-nav-btn" data-tab="stats">Stats</button>
          </aside>

          <div class="admin-content">
            <!-- Products panel -->
            <section class="admin-panel active" id="panel-products">
              <div class="section-head">
                <h3>Products</h3>
                <button class="btn" id="addProductBtn">+ Add Product</button>
              </div>
              <div class="table-wrap">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="productsTableBody"></tbody>
                </table>
              </div>
            </section>

            <!-- Orders panel -->
            <section class="admin-panel" id="panel-orders">
              <div class="section-head"><h3>Orders</h3></div>
              <div class="table-wrap">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Date</th><th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="ordersTableBody"></tbody>
                </table>
              </div>
            </section>

            <!-- Stats panel -->
            <section class="admin-panel" id="panel-stats">
              <div class="section-head"><h3>Overview</h3></div>
              <div class="stats-grid">
                <div class="stat-card revenue">
                  <div class="label">Total Revenue</div>
                  <div class="value" id="statRevenue">Rs. 0</div>
                </div>
                <div class="stat-card orders">
                  <div class="label">Total Orders</div>
                  <div class="value" id="statOrders">0</div>
                </div>
                <div class="stat-card products">
                  <div class="label">Products in Store</div>
                  <div class="value" id="statProducts">0</div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Product modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">Add Product</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="productForm">
        <input type="hidden" id="p_id" />
        <div class="form-group">
          <label for="p_name">Name</label>
          <input class="form-control" id="p_name" required />
        </div>
        <div class="form-group">
          <label for="p_description">Description</label>
          <textarea class="form-control" id="p_description" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="p_price">Price (Rs.)</label>
            <input class="form-control" type="number" step="0.01" min="0" id="p_price" required />
          </div>
          <div class="form-group">
            <label for="p_stock">Stock</label>
            <input class="form-control" type="number" min="0" id="p_stock" required />
          </div>
        </div>
        <div class="form-group">
          <label for="p_category">Category</label>
          <select class="form-control" id="p_category"></select>
        </div>
        <div class="form-group">
          <label for="p_image">Product Image</label>
          <input class="form-control" type="file" id="p_image" accept="image/*" />
        </div>
        <button type="submit" class="btn btn-block btn-lg">Save Product</button>
      </form>
    </div>
  </div>

  <script src="js/pk_images.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
