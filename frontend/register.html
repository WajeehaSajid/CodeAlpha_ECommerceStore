<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — NovaShop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="navbar-mount"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Create account</h1>
      <p class="subtitle">Join NovaShop and start shopping</p>
      <div id="formError" class="form-error hidden"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input class="form-control" type="text" id="name" placeholder="Jane Doe" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input class="form-control" type="password" id="password" placeholder="At least 6 characters" required />
            <button type="button" class="toggle-pass">Show</button>
          </div>
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <div class="role-select">
            <label><input type="radio" name="role" value="user" checked /><span>Customer</span></label>
            <label><input type="radio" name="role" value="admin" /><span>Admin</span></label>
          </div>
        </div>
        <button type="submit" class="btn btn-block btn-lg">Create Account</button>
      </form>
      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>
  <script src="js/pk_images.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
