<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — NovaShop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="navbar-mount"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your NovaShop account</p>
      <div id="formError" class="form-error hidden"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input class="form-control" type="password" id="password" placeholder="••••••••" required />
            <button type="button" class="toggle-pass">Show</button>
          </div>
        </div>
        <button type="submit" class="btn btn-block btn-lg">Sign In</button>
      </form>
      <p class="muted" style="text-align:center;margin-top:16px;font-size:13px">
        Demo admin: admin@store.com / admin123
      </p>
      <div class="auth-switch">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>
  </div>
  <script src="js/pk_images.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
